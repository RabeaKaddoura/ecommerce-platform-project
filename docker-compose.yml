#Docker compose file to test frontend and backend services containers.
services:
  #Infrastructure
  kafka:
    image: apache/kafka:4.1.2
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3

  #DB
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  #Backend services
  auth-service:
    build:
      context: ./backend/auth-service
    container_name: auth-service
    ports:
      - "8002:8000"
    env_file:
      - ./backend/auth-service/.env
    depends_on:
      - postgres
      - kafka

  cart-service:
    build:
      context: ./backend/cart-service
    container_name: cart-service
    ports:
      - "8001:8000"
    env_file:
      - ./backend/cart-service/.env
    depends_on:
      - postgres
      - kafka

  order-service:
    build:
      context: ./backend/order-service
    container_name: order-service
    ports:
      - "8000:8000"
    env_file:
      - ./backend/order-service/.env
    depends_on:
      - postgres
      - kafka

  payment-service:
    build:
      context: ./backend/payment-service
    container_name: payment-service
    ports:
      - "8004:8000"
    env_file:
      - ./backend/payment-service/.env
    depends_on:
      - postgres
      - kafka

  product-service:
    build:
      context: ./backend/product-service
    container_name: product-service
    ports:
      - "8003:8000"
    env_file:
      - ./backend/product-service/.env
    depends_on:
      - postgres

  #Frontend
  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "80:80"
    environment:
      PRODUCT_SERVICE_URL: http://localhost:8003
      STRIPE_PUBLISHABLE_KEY: pk_test_51TKIryDq9rvsBqPl2JpR2wvbLj1C8nnd2FylbVHI2YDI5QyoFhVRf00hXrRls2tmi3FUN95mzTi2yzqcyU64cUB200ByQvYLDk

volumes:
  postgres_data:

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    #Proxy API requests to backend services
    location /api/auth/ {
        proxy_pass http://auth-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/products/ {
        proxy_pass http://product-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/cart/ {
        proxy_pass http://cart-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/orders/ {
        proxy_pass http://order-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/payments/ {
        proxy_pass http://payment-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    #Proxy image requests to product-service static files
    location /images/ {
        proxy_pass http://product-service:8000/static/images/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    #Serve config.js for runtime env variables
    location /config.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    #Handle React client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    #Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    #Compression for smaller payloads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
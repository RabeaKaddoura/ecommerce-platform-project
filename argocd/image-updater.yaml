#ImageUpdater CRs for each service. Replaces the old annotation-based approach used in Image Updater <v1.2.0.
#Each CR watches ECR for new images matching the service tag filter and updates the corresponding ArgoCD Application's helm image.tag value.
#Image Updater polls ECR every 2 minutes and commits the new tag back to git, which triggers ArgoCD to sync and deploy the new image.

apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: auth-svc
  namespace: argocd
spec:
  applicationRefs:
    - namePattern: "auth-svc"
      images:
        - alias: myimage
          imageName: 844586871941.dkr.ecr.us-east-1.amazonaws.com/ecom-ecr
          commonUpdateSettings:
            updateStrategy: newest-build
            allowTags: "regexp:^auth-service-.*$"
          manifestTargets:
            helm:
              name: image.repository
              tag: image.tag
---

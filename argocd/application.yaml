apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/RabeaKaddoura/ecommerce-platform-project.git
        revision: HEAD
        directories:
          - path: helm/*
          - path: helm/kafka.yaml
            exclude: true
          - path: helm/backend-common
            exclude: true
          - path: helm/alb
            exclude: true
  template:
    metadata:
      name: "{{path.basename}}"
    spec:
      project: default
      source:
        repoURL: https://github.com/RabeaKaddoura/ecommerce-platform-project.git
        targetRevision: HEAD
        path: "{{path}}"
        helm:
          releaseName: "{{path.basename}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: default
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
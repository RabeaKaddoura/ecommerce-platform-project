apiVersion: v1
kind: Secret
metadata:
  name: payment-app-secret
  labels:
    app.kubernetes.io/name: payment-svc
    app.kubernetes.io/managed-by: Helm
type: Opaque
stringData:
  STRIPE_SECRET_KEY: {{ .Values.appSecrets.stripeSecretKey | required "appSecrets.stripeSecretKey is required" | quote }}
  STRIPE_WEBHOOK_SECRET: {{ .Values.appSecrets.stripeWebhookSecret | required "appSecrets.stripeWebhookSecret is required" | quote }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: backend-db-secrets
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: {{ .Values.secretProvider.secretArn | quote }}
        objectType: secretsmanager
        jmesPath:
          - path: username
            objectAlias: db_username
          - path: password
            objectAlias: db_password
          - path: host
            objectAlias: db_host
          - path: port
            objectAlias: db_port
          
  secretObjects:
    - secretName: backend-db-secret
      type: Opaque
      data:
        - objectName: db_username
          key: username
        - objectName: db_password
          key: password
        - objectName: db_host
          key: host
        - objectName: db_port
          key: port
       

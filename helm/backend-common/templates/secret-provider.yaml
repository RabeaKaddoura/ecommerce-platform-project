apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: backend-db-secrets
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: {{ .Values.secretProvider.secretArn | quote }}
        objectType: secretsmanager
        jmesPath:
          - path: username
            objectAlias: db_username
          - path: password
            objectAlias: db_password
          - path: host
            objectAlias: db_host
          - path: port
            objectAlias: db_port
          - path: auth_secret_key
            objectAlias: auth_secret_key
          - path: stripe_secret_key
            objectAlias: stripe_secret_key
          - path: stripe_webhook_secret
            objectAlias: stripe_webhook_secret
          - path: stripe_publishable_key
            objectAlias: stripe_publishable_key
  secretObjects:
    - secretName: backend-db-secret
      type: Opaque
      data:
        - objectName: db_username
          key: username
        - objectName: db_password
          key: password
        - objectName: db_host
          key: host
        - objectName: db_port
          key: port
        - objectName: auth_secret_key
          key: auth_secret_key
        - objectName: stripe_secret_key
          key: stripe_secret_key
        - objectName: stripe_webhook_secret
          key: stripe_webhook_secret
        - objectName: stripe_publishable_key
          key: stripe_publishable_key
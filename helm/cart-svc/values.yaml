#Image
image:
  repository: "844586871941.dkr.ecr.us-east-1.amazonaws.com/ecom-ecr"
  tag: "cart-service-10e31e2fcd19bb889b493f57b6bcbc227a660f76"
  pullPolicy: IfNotPresent

#Replicas
replicas: 2

#Resources
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

#HPA
hpa:
  minReplicas: 2
  maxReplicas: 4
  targetCPU: 70

#Non-sensitive config
config:
  dbName: "cart_db"
  kafkaBootstrapServers: "kafka-kafka-bootstrap.default.svc.cluster.local:9092"
  authServiceUrl: "http://auth-stable:8000"




#Service account
serviceAccountName: backend-sa


#Port
port: 8000
